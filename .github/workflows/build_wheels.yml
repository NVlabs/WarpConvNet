name: Build and publish wheels

on:
  push:
    tags:
      - v*
  workflow_dispatch:

# Map matrix.cuda short names to Docker image CUDA versions and PyTorch index URLs
env:
  TORCH_CUDA_ARCH_LIST: "8.0;8.6;8.9;9.0a"

jobs:
  build_wheels:
    name: "py${{ matrix.python }} torch${{ matrix.torch }} ${{ matrix.cuda }}"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:${{ matrix.cuda_docker }}-devel-ubuntu22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- torch 2.11.0 + cu130 ----
          - { torch: "2.11.0", torch_short: "2.11", cuda: "cu130", cuda_docker: "13.0.1", python: "3.10" }
          - { torch: "2.11.0", torch_short: "2.11", cuda: "cu130", cuda_docker: "13.0.1", python: "3.11" }
          - { torch: "2.11.0", torch_short: "2.11", cuda: "cu130", cuda_docker: "13.0.1", python: "3.12" }
          - { torch: "2.11.0", torch_short: "2.11", cuda: "cu130", cuda_docker: "13.0.1", python: "3.13" }
          - { torch: "2.11.0", torch_short: "2.11", cuda: "cu130", cuda_docker: "13.0.1", python: "3.14" }
          # ---- torch 2.10.0 + cu130 ----
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu130", cuda_docker: "13.0.1", python: "3.10" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu130", cuda_docker: "13.0.1", python: "3.11" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu130", cuda_docker: "13.0.1", python: "3.12" }
          # ---- torch 2.10.0 + cu128 ----
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu128", cuda_docker: "12.8.0", python: "3.10" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu128", cuda_docker: "12.8.0", python: "3.11" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu128", cuda_docker: "12.8.0", python: "3.12" }
          # ---- torch 2.10.0 + cu126 ----
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu126", cuda_docker: "12.6.3", python: "3.10" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu126", cuda_docker: "12.6.3", python: "3.11" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu126", cuda_docker: "12.6.3", python: "3.12" }
          # ---- torch 2.5.1 + cu124 ----
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu124", cuda_docker: "12.4.1", python: "3.10" }
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu124", cuda_docker: "12.4.1", python: "3.11" }
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu124", cuda_docker: "12.4.1", python: "3.12" }

    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common git
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y python${{ matrix.python }} python${{ matrix.python }}-dev python${{ matrix.python }}-venv
          python${{ matrix.python }} -m ensurepip --upgrade || true

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Create venv and install dependencies
        run: |
          python${{ matrix.python }} -m venv /tmp/buildenv
          . /tmp/buildenv/bin/activate
          pip install --upgrade pip setuptools 'setuptools-scm<10' wheel pybind11 ninja
          pip install torch==${{ matrix.torch }}+${{ matrix.cuda }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.cuda }}

      - name: Build wheel
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . /tmp/buildenv/bin/activate
          # Get base version without local segment, then append torch tag
          BASE_VERSION=$(SETUPTOOLS_SCM_LOCAL_SCHEME=no-local-version python -c "from setuptools_scm import get_version; print(get_version())")
          export SETUPTOOLS_SCM_PRETEND_VERSION="${BASE_VERSION}+torch${{ matrix.torch_short }}${{ matrix.cuda }}"
          echo "Building version: ${SETUPTOOLS_SCM_PRETEND_VERSION}"
          python setup.py bdist_wheel

      - name: Repair wheel (manylinux tag)
        run: |
          . /tmp/buildenv/bin/activate
          pip install auditwheel patchelf
          auditwheel repair dist/*.whl \
            --plat manylinux_2_28_x86_64 \
            -w dist/repaired/ \
            --exclude libtorch.so \
            --exclude libtorch_cpu.so \
            --exclude libtorch_cuda.so \
            --exclude libtorch_python.so \
            --exclude libc10.so \
            --exclude libc10_cuda.so \
            --exclude libcudart.so \
            --exclude libcublas.so \
            --exclude libcublasLt.so \
            --exclude libcuda.so || cp dist/*.whl dist/repaired/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-torch${{ matrix.torch_short }}-${{ matrix.cuda }}-py${{ matrix.python }}
          path: dist/repaired/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build sdist
        run: |
          pip install build 'setuptools-scm<10'
          # Suppress local version segment (+g1234567) — PyPI rejects local identifiers
          export SETUPTOOLS_SCM_LOCAL_SCHEME=no-local-version
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_release:
    name: Upload wheels to GitHub Release
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: Determine version tag
        id: version
        run: |
          pip install 'setuptools-scm<10'
          VERSION=$(SETUPTOOLS_SCM_LOCAL_SCHEME=no-local-version python -c "from setuptools_scm import get_version; print(get_version())")
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Create release if it doesn't exist
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-notes
          # Upload wheels (overwrite if re-running)
          gh release upload "$TAG" all-wheels/*.whl --clobber

  publish_pypi:
    name: Publish sdist to PyPI
    needs: build_sdist
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
