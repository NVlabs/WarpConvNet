name: Build and publish wheels

on:
  push:
    tags:
      - v*
  workflow_dispatch:

# Map matrix.cuda short names to Docker image CUDA versions and PyTorch index URLs
env:
  TORCH_CUDA_ARCH_LIST: "8.0;8.6;8.9;9.0a"

jobs:
  build_wheels:
    name: "py${{ matrix.python }} torch${{ matrix.torch }} ${{ matrix.cuda }}"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:${{ matrix.cuda_docker }}-devel-ubuntu22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- torch 2.10.0 + cu130 ----
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu130", cuda_docker: "13.0.1", python: "3.10" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu130", cuda_docker: "13.0.1", python: "3.11" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu130", cuda_docker: "13.0.1", python: "3.12" }
          # ---- torch 2.10.0 + cu128 ----
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu128", cuda_docker: "12.8.0", python: "3.10" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu128", cuda_docker: "12.8.0", python: "3.11" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu128", cuda_docker: "12.8.0", python: "3.12" }
          # ---- torch 2.10.0 + cu126 ----
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu126", cuda_docker: "12.6.3", python: "3.10" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu126", cuda_docker: "12.6.3", python: "3.11" }
          - { torch: "2.10.0", torch_short: "2.10", cuda: "cu126", cuda_docker: "12.6.3", python: "3.12" }
          # ---- torch 2.5.1 + cu124 ----
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu124", cuda_docker: "12.4.1", python: "3.10" }
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu124", cuda_docker: "12.4.1", python: "3.11" }
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu124", cuda_docker: "12.4.1", python: "3.12" }
          # ---- torch 2.5.1 + cu121 ----
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu121", cuda_docker: "12.1.1", python: "3.10" }
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu121", cuda_docker: "12.1.1", python: "3.11" }
          - { torch: "2.5.1", torch_short: "2.5", cuda: "cu121", cuda_docker: "12.1.1", python: "3.12" }

    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common git
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y python${{ matrix.python }} python${{ matrix.python }}-dev python${{ matrix.python }}-venv
          python${{ matrix.python }} -m ensurepip --upgrade || true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create venv and install dependencies
        run: |
          python${{ matrix.python }} -m venv /tmp/buildenv
          . /tmp/buildenv/bin/activate
          pip install --upgrade pip setuptools wheel pybind11 ninja
          pip install torch==${{ matrix.torch }}+${{ matrix.cuda }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.cuda }}

      - name: Build wheel
        run: |
          . /tmp/buildenv/bin/activate
          export WARPCONVNET_LOCAL_VERSION="torch${{ matrix.torch_short }}${{ matrix.cuda }}"
          python setup.py bdist_wheel

      - name: Repair wheel (manylinux tag)
        run: |
          . /tmp/buildenv/bin/activate
          pip install auditwheel patchelf
          auditwheel repair dist/*.whl \
            --plat manylinux_2_28_x86_64 \
            -w dist/repaired/ \
            --exclude libtorch.so \
            --exclude libtorch_cpu.so \
            --exclude libtorch_cuda.so \
            --exclude libtorch_python.so \
            --exclude libc10.so \
            --exclude libc10_cuda.so \
            --exclude libcudart.so \
            --exclude libcublas.so \
            --exclude libcublasLt.so \
            --exclude libcuda.so || cp dist/*.whl dist/repaired/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-torch${{ matrix.torch_short }}-${{ matrix.cuda }}-py${{ matrix.python }}
          path: dist/repaired/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_gh_pages:
    name: Publish wheels to GitHub Pages
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: Generate PEP 503 index
        run: |
          pip install packaging
          python scripts/generate_index.py all-wheels/ whl/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: whl/
          destination_dir: whl
          keep_files: true

  publish_pypi:
    name: Publish sdist to PyPI
    needs: build_sdist
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.8.10
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
